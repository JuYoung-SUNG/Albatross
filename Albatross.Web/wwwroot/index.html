<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Albatross - 최신 뉴스를 자동으로 수집하고 한눈에 확인하는 서비스" />
    <title>Albatross 뉴스</title>
    <base href="/" />
    <link href="css/app.css" rel="stylesheet" />

  <body>

      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0d1117;color:#e6edf3;font-family:sans-serif;">

          <circle cx="25" cy="25" r="20" fill="none" stroke="#2ea043" stroke-width="4" stroke-dasharray="80 40"/>

    </div>
